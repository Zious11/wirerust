policies:
  - id: DF-VALIDATION-001
    name: research-validated-deferred-findings
    description: >
      Every deferred or open finding — STATE.md Drift Items, spec
      contradictions, adversarial or review backlog items, and any finding
      explicitly deferred rather than fixed — MUST be validated by the
      vsdd-factory:research-agent before it is filed as a GitHub issue or
      otherwise actioned. The research agent must confirm the finding is
      sound and still open on the current default branch (develop), citing
      sources. A finding that fails research-agent validation (resolved,
      invalid, or mis-stated) MUST NOT become an issue.
    severity: HIGH
    scope:
      - orchestrator
      - issue-filing
      - deferred-findings
    rationale: >
      Deferred findings are frequently captured from stale snapshots (for
      example a pre-remediation brownfield-ingest corpus) and may already
      be resolved, invalid, or mis-stated. Research-agent validation
      prevents filing noise and stale issues.
    added: "2026-05-20"

  - id: DF-SIBLING-SWEEP-001
    name: mandatory-sibling-sweep-on-remediation
    description: >
      Every remediation dispatch to story-writer, test-writer, or
      product-owner MUST include an explicit sibling-sweep checklist with
      concrete grep commands. The dispatching orchestrator MUST inject the
      relevant checklist into the agent's task prompt before sending. The
      agent MUST execute the listed greps, report all hits with verdicts,
      and fix ALL instances of the same pattern in the same burst — not
      just the cited location. Single-site remediations that leave sibling
      instances unfixed are a sibling-discipline regression and MUST be
      caught by the agent's own sweep, not by the next adversarial pass.

      Concrete sibling-sweep targets per artifact type:

      STORY edits (story-writer):
        - After AC/EC content change: grep the entire story file for the
          same wording in (a) Tasks list, (b) Architecture Compliance
          Rules table, (c) body prose, (d) related EC rows. Fix every
          live occurrence; preserve historical changelog entries.
        - After test-name rename: grep .factory/ for old test name (some
          stories cite test names in AC trace fields).
        - After BC reference change: verify all BC citations in story
          body match new BC version; recompute input-hash if any input BC
          changed content.
        - Verify story frontmatter (behavioral_contracts,
          verification_properties) matches body BC table and AC traces.

      BC edits (product-owner):
        - After PC/Inv/EC content change: grep the BC file for
          cross-references; verify all anchor citations against current
          source via Read of cited file:line range.
        - After version bump: identify sibling BCs in same subsystem
          (BC-2.04.0XX peers) and check for symmetric updates required
          (e.g., if a PC is added to one BC about a shared codepath, the
          sibling BC needs the same PC). Sibling BC = any BC whose
          Architecture Anchor references the same source function or any
          BC in the Related-BCs section.
        - After anchor citation: for every cited line number, verify
          against actual source code. If lines shift due to prior
          remediation, sweep ALL anchor citations across the BC + body
          prose + canonical test vectors. Numeric values in canonical
          test vectors MUST be arithmetically valid against the described
          scenario.
        - For every placeholder (PC-N, AC-N, EC-N, VP-NNN in data rows):
          verify it has been replaced with a concrete value before commit.

      TEST edits (test-writer):
        - After test fix: grep the entire test file for the same
          anti-pattern (exploratory comment chains, stale references,
          scope-misapplications, "BUG CANDIDATE" leftover prose).
        - After test rename: grep the entire repo for old function name
          in stories, BCs, comments, other tests. Update all references.
        - After assertion strengthening (e.g., adding gap-content +
          first-wins): check sibling tests exercising the same code path
          for the same coverage gap. Apply same strengthening to all
          siblings.
        - After test docstring updates: verify the prose actually
          matches the test body (no "Wait:", "Actually:", "Approach X but
          Y" exploratory chains that contradict the final implementation).

      BC pre-merge re-anchor (W11.L1, F-W11P8-001):
        - When a story's implementation shifts cited source-code line
          numbers (e.g., test seams pushed below existing code), the BCs
          cited in the story's `bcs:` frontmatter MUST be re-anchored to
          post-merge line numbers as part of the story's convergence
          cycle — NOT deferred to a follow-up sweep on develop.
        - This eliminates the post-merge stale-anchor window where BC
          anchors point to pre-story-merge code and reviewers/auditors
          follow them to the wrong location.
        - Procedure: orchestrator dispatches product-owner to update each
          affected BC to cite worktree-post-story line numbers; BC version
          bump records the doctrine choice; story input-hash recomputed
          to acknowledge the BC content change; final adversarial pass
          verifies all BC anchors match worktree source.

      Lock-discipline propagation for newly-introduced process-globals (W11.L2, F-W11P1-012):
        - When a story introduces a new process-global atomic (e.g.,
          `FINALIZE_SKIPPED_WARNED`), the corresponding test-binary
          `_LOCK` static MUST be added in the same diff with a docstring
          naming all tests required to hold it (observer + defensive
          holder categories).
        - Test-writer MUST grep the binary for ALL tests that read/write
          the underlying atomic (including indirect via Drop side-effect)
          and add the lock to each if it observes the atomic; defensive
          holders documented separately.

      Story-writer post-AC-add sibling-sweep (W11.L4, F-W11P2-014):
        - After AC additions to a story, the sibling-sweep step MUST
          update existing task descriptions referencing AC counts/ranges
          (e.g., "Write tests for all N ACs" — N must be updated when
          ACs are added), not just append new tasks. Pass-2 caught a
          stale "13 ACs" wording in Task 1 after 5 new ACs landed.

      Source-docstring propagation for story-body changes (W11.L4, F-W11P6-001):
        - When a story body changes a "magic number" or factual claim
          (e.g., "194 sites" → "~130+ sites"), story-writer MUST also
          identify all source/test-file docstrings that publish the same
          claim and dispatch test-writer to update them in the same
          cycle. Pass-6 found 7 docstring sites still publishing the old
          content after pass-5's story-body fix.

      EC-scenario-match sub-rule for BC anchor citations (W12.L1, F-W12P6-001):
        - When an EC row in a BC's Edge Cases table includes a `covered
          by <test>` citation, the cited test MUST exercise the SPECIFIC
          scenario described in the EC row (e.g., specific port number,
          specific byte value, specific length boundary), not just the
          parent BC capability.
        - Example: BC-2.05.002 EC-001 says "data starts with b\"GET \" on
          port 443" — must cite a test that uses port 443, not a test that
          uses port 9999 (even if both demonstrate HTTP routing). Pass-6
          adversary caught this by re-reading the EC text against the
          cited test body.
        - This sub-rule applies during BC-edit dispatches and during
          adversarial review. Adversaries should flag EC-citation
          mismatches as MEDIUM mis-anchor (citation exists but doesn't
          match scenario).
        - Story-writer + PO MUST verify scenario-match during BC anchor
          additions: read the EC row, read the cited test body, confirm
          the test setup reproduces the EC scenario exactly.

      Single-burst-all-BCs rule for anchor-completeness (W12.L2):
        - When anchor-completeness doctrine applies to ONE BC in a story
          (e.g., adding new test names to its Architecture Anchors), the
          dispatching orchestrator MUST sweep ALL BCs in the story's
          `bcs:` frontmatter in the SAME burst — not iteratively across
          adversarial passes.
        - Pattern observed in Wave 12: pass-3 anchor fix to BC-2.05.002
          left BC-2.05.001/003 with same gap; pass-4 caught and fixed
          siblings; pass-6 caught yet another EC mis-anchor in BC-2.05.002
          that the pass-3 sweep had missed. Each iteration cost an
          adversarial pass + remediation burst (~1.5 hours each).
        - PO dispatches for BC anchor updates MUST include explicit
          checklist item: "Sweep ALL BCs in story `bcs:` frontmatter for
          the same class of update (renamed tests, new test additions,
          line-citation drift, EC-scenario-match) before committing."
        - Adversaries should flag any BC anchor update that addresses
          only one BC when other BCs in the story `bcs:` would benefit
          from the same update as a sibling-sweep gap [process-gap].

      BC anchor/citation change — consuming-story body sweep (v4, PG-W16-003, F-W16-S044-P3-001):
        - When a BC anchor or citation changes (Architecture Anchor line
          numbers shift, test name cited in a BC Architecture Anchor is
          renamed, or a source-code anchor is re-pointed), the sweep MUST
          extend beyond the BC file and sibling BCs to ALL CONSUMING STORY
          bodies that cite the same source anchor.
        - Consuming-story locations to check:
            (a) Architecture-Mapping tables (the "Anchor" or "File:Line"
                column) — these mirror BC anchor citations and drift when
                source lines shift.
            (b) Token-Budget anchors — stories may cite specific
                file:line ranges for budget accounting; these must match
                the updated BC anchor.
            (c) Body prose — inline references such as "as anchored at
                src/foo.rs:L123" drift independently from BC files.
        - Procedure: after updating any BC anchor, grep `.factory/stories/`
          for the old anchor string (e.g., old line number or old test name)
          to find all story body occurrences; update all hits in the same
          burst; verify with a second grep that no occurrences remain.
        - This rule is additive to (not a replacement for) the existing
          single-burst-all-BCs rule above. Both rules apply simultaneously
          when a BC anchor changes.

      ALL remediations:
        - Before commit: execute the grep commands listed above and
          report results in the burst report.
        - If the pattern appears in multiple places, fix ALL in the same
          burst — do not leave siblings as "follow-up".
        - If a sibling-regression IS introduced, the next-pass adversary
          will catch it; reporting the regression in the same-pass
          report is a sign the sweep was incomplete.
    severity: CRITICAL
    scope:
      - orchestrator
      - remediation
      - story-writer
      - test-writer
      - product-owner
    rationale: >
      Wave 9 evidence: the sibling-discipline pattern fired 6 consecutive
      times in a single wave (STORY-020 per-story P2/P3/P4 + wave-level
      P1/P2/P3), inflating wave cost from ~10 adversarial passes to ~20.
      Each remediation created new regressions because no agent prompt
      mandated explicit sibling-sweep. The pattern broke only when fixes
      were trivial text-only edits (no semantic propagation needed). The
      structural fix is to make sibling-sweep a non-optional checklist
      step at every remediation dispatch site, not a hopeful adversary
      axis catch. See W9-D8 in STATE.md drift items for cumulative
      evidence across Waves 7-9.
    enforcement: >
      Orchestrator MUST inject the relevant sibling-sweep section into
      every story-writer/test-writer/product-owner task prompt under a
      "## Sibling-Sweep Checklist (MANDATORY per DF-SIBLING-SWEEP-001)"
      heading. Agents MUST execute the checklist and report grep results
      in their burst report. Adversaries should flag any sibling-
      regression that escapes the sweep as a process-gap with a pointer
      to DF-SIBLING-SWEEP-001 — repeated violations escalate the policy
      enforcement level.
    added: "2026-05-26"
    last-extended: "2026-05-28"
    version: v4
    derived-from: >
      W9-D8 (closed during codification); extended v2 2026-05-27
      (W11.L1/L2/L4); extended v3 2026-05-27 (W12.L1/L2); extended v4
      2026-05-28 (PG-W16-003, F-W16-S044-P3-001)

  - id: DF-PR-MANAGER-COMPLETE-001
    name: pr-manager-must-complete-merge
    description: >
      The pr-manager agent runs a 9-step PR lifecycle for every story PR.
      The pr-reviewer's APPROVE verdict is step 6 of 9 — NOT the
      stopping point. Steps 7 (handle approval), 8 (squash merge), and 9
      (post-merge cleanup) are mandatory completions of the dispatch and
      MUST execute before pr-manager reports back to the orchestrator.

      pr-manager MUST NOT terminate its dispatch after receiving an
      APPROVE verdict from pr-reviewer (or a third-party reviewer agent
      it spawned, e.g., zclaude:security-reviewer). The dispatch ends
      ONLY after the merge commit SHA is confirmed on develop AND the
      worktree branch is deleted both locally and remotely.

      Concrete completion criteria (ALL required before reporting back):

      Step 7 — Handle approval:
        - If formal `gh pr review --approve` is blocked by GitHub's
          self-review policy (common in single-author repos), the
          pr-reviewer's textual APPROVE in a review comment IS the
          canonical sign-off per project Wave 8/9 convention.
        - Document this in the merge commit body if relevant.

      Step 8 — Squash merge:
        - Execute: `gh pr merge <#> --squash --admin --delete-branch
          --subject "<semantic-PR-compliant>" --body "<description>"`
        - The `--admin` flag bypasses self-merge restriction per project
          convention.
        - The `--delete-branch` flag removes the worktree branch from
          remote (local branch deletion happens in step 9).
        - Verify the merge commit SHA appears on develop via
          `gh pr view <#> --json mergeCommit` or `git fetch && git log
          origin/develop`.

      Step 9 — Post-merge cleanup:
        - `cd <repo-root> && git fetch origin && git checkout develop &&
          git pull origin develop --ff-only`
        - `git worktree remove .worktrees/<branch> --force || true`
        - `git worktree prune`
        - `git branch -D <branch> 2>&1 || true`
        - Verify final state: `git worktree list` shows the branch is
          gone; `git branch -a` shows no local copy.

      Report back ONLY after all three steps complete with:
        1. Final merge commit SHA on develop
        2. CI status post-merge (still green)
        3. Branch + worktree cleanup confirmation
        4. New develop HEAD

    severity: HIGH
    scope:
      - orchestrator
      - pr-manager
    rationale: >
      Wave 8-9 evidence: pr-manager stopped at APPROVE verdict on 7
      consecutive PRs (#122/123/126/127/128/129/130), each requiring
      orchestrator-direct gh CLI follow-through. Cumulative orchestrator
      cost: ~7 round-trips of merge intervention per wave. The pattern
      is structural — the pr-manager agent prompt under-emphasizes
      steps 7-9 relative to the review loop in steps 4-6. Codifying the
      completion criteria as a project policy gives the orchestrator a
      concrete enforcement target when dispatching pr-manager: inject
      this policy explicitly into the dispatch task, and if the agent
      still reports back at step 6, the policy violation justifies
      either a fresh dispatch or direct orchestrator merge.
    enforcement: >
      Orchestrator MUST inject this policy into every pr-manager
      dispatch under a "## PR Completion Policy (MANDATORY per
      DF-PR-MANAGER-COMPLETE-001)" heading. The injection MUST quote the
      specific gh pr merge command template above with `<#>` and
      `<branch>` substituted. If pr-manager reports back at step 6
      without executing steps 7-9, the orchestrator MAY (a) re-dispatch
      pr-manager with explicit "complete steps 7-9 NOW" SendMessage, OR
      (b) execute the merge directly via gh CLI and tag the bypass as
      a policy violation in the wave retrospective. Persistent violations
      should be escalated as agent-prompt-defect bugs to the
      vsdd-factory plugin maintainer.
    added: "2026-05-26"
    derived-from: W9.L3 (closed during codification)

  - id: DF-AC-TEST-NAME-SYNC-001
    name: ac-test-name-sync
    description: >
      Story AC bodies cite test names in "**Test:**" lines. These citations
      MUST match `fn test_*` definitions in the cited test file (typically
      tests/<module>_tests.rs). The mismatch pattern observed in Wave 14
      (story body cited short-form names like `test_unclassified_flows_counter`
      while tests used BC-prefixed names like
      `test_BC_2_05_007_unclassified_flows_counter`) causes traceability
      failures and adversary-pass remediation.

      Mandatory practices for story-writer + test-writer:
        - Story-writer: when authoring or editing AC "**Test:**" lines,
          verify cited names exist via grep of the cited test file BEFORE
          commit.
        - Test-writer: when adding tests using BC-prefixed convention,
          update story AC "**Test:**" lines in the same burst (sibling-sweep
          per DF-SIBLING-SWEEP-001 v4).
        - Adversary: flag any AC citing a test name not present in the cited
          test file as MEDIUM (or HIGH if 3+ ACs affected).

      Unique-resolution rule (v2, PG-W16-001, absorbs F-W16-WAVE-P1-003):
        - An AC "**Test:**" citation MUST resolve to EXACTLY ONE `fn test_*`
          across the entire test suite. If a bare name matches two or more
          functions across module boundaries (e.g., the same short suffix
          exists in both `http_tests.rs` and `tls_tests.rs`), the citation
          MUST use a module-qualified form (e.g., `http_tests::test_foo`) so
          that a reader or tooling can identify the unique function without
          ambiguity.
        - A citation that is ambiguous (matches multiple functions) is treated
          the same as a citation that matches zero functions: it is a broken
          reference and MUST be flagged as MEDIUM by the adversary.
        - Line-anchor citations (if any): when an AC "**Test:**" line includes
          a line-number anchor (e.g., `:L42`), that anchor MUST point to the
          `fn test_` declaration line, NOT to a comment inside a neighbor
          test or to prose inside the function body. Verify by reading the
          cited file at the cited line and confirming the text starts with
          `fn test_` or `#[test]` / `#[tokio::test]` etc.
        - Story-writer and test-writer MUST run both checks (name-exists AND
          name-unique) before committing or requesting an adversarial pass.

    severity: MEDIUM
    scope:
      - story-writer
      - test-writer
      - adversary
    rationale: >
      Wave 14 Pass 1 evidence: STORY-033 had 9 ACs all citing short-form
      test names; actual test functions used BC-prefixed names; this triggered
      F-W14P1-001 (HIGH classification) + F-W14P1-002 (FSR row mismatch) +
      F-W14P1-007 (EC-scenario-match drift cascading from naming). All three
      findings would have been prevented by the discipline above. Wave 12 also
      surfaced a related pattern (W12.L2 single-burst-all-BCs). Wave 16
      surfaced the cross-module ambiguity variant (PG-W16-001,
      F-W16-WAVE-P1-003): a bare test name matched two functions across
      module boundaries, and a line-anchor pointed inside a neighbor test
      body rather than at the fn declaration. The v2 unique-resolution rule
      closes both gaps.
    enforcement: >
      Adversary-pass-1 check: grep story AC "**Test:**" lines vs `fn test_`
      in cited test files; flag mismatches as MEDIUM. Also grep the ENTIRE
      test suite (not just the cited file) for any name that appears in more
      than one file; flag duplicates requiring module qualification as MEDIUM.
      When a line anchor is present, Read the file at that line and confirm
      the line is a fn declaration. Story-writer and test-writer MUST
      cross-verify AC citations and test function names in the same commit
      burst before any adversarial pass is dispatched.
    added: "2026-05-28"
    last-extended: "2026-05-28"
    version: v2
    derived-from: >
      F-W14P1-011 (W14 process-gap finding, v1); extended v2 2026-05-28
      (PG-W16-001, F-W16-WAVE-P1-003, F-W16-S044-P4-001)

  - id: DF-ADVERSARY-METHODOLOGY-001
    name: adversary-dispatch-absolute-paths-mandatory
    description: >
      Orchestrator dispatch prompts to adversary agents MUST use
      absolute paths for ALL file operations. The `cd <path> && ...`
      pattern is FORBIDDEN in adversary dispatches because the cd does
      not persist across the adversary's Bash invocations in some
      profiles, causing the adversary to query the wrong filesystem
      (e.g., main repo instead of worktree).

      Mandatory practices:
        - Use full absolute paths for every file Read, Grep, glob, or
          Bash invocation: `/Users/zious/.../worktrees/story-N/src/...`
          not just `src/...`.
        - When git operations require a specific repo, use `git -C
          <absolute-path> ...` not `cd <path> && git ...`.
        - Include explicit verification commands in the dispatch (e.g.,
          "grep -n '^impl Drop' /full/worktree/path/src/...") that
          would return different values from the worktree vs main repo,
          so the adversary self-detects methodology errors.
        - If the adversary's verifications return values that suggest
          wrong-directory queries (e.g., expected impl Drop at line 794
          but got 706), the adversary MUST abort and report a
          methodology error.

      The cargo-specific `cd <worktree> && cargo ...` is allowed because
      cargo's behavior depends on cwd — but only for cargo commands,
      not for file inspection.

    severity: HIGH
    scope:
      - orchestrator
      - adversary
      - dispatch-templates
    rationale: >
      Wave 11 pass-5 evidence: adversary cd'd to worktree but Bash
      cwd reset between invocations, causing the adversary to grep
      the main repo. Produced 2 FALSE-CRITICAL findings ("no STORY-021
      implementation exists") that misled the convergence process and
      required orchestrator-side methodology debugging. The pattern is
      structural to read-only agent profiles where Bash state does not
      persist across the agent's tool-use loop.
    enforcement: >
      Orchestrator MUST audit every adversary dispatch prompt for
      relative paths in file-operation contexts before sending. The
      adversary's first reply MUST include verification command output
      proving worktree vs main repo distinction (e.g., "impl Drop at
      line 794 worktree, line 706 main — distinct, methodology OK").
      If the verification output is missing or shows wrong-directory
      query, the orchestrator MUST re-dispatch with corrected prompt.
    added: "2026-05-27"
    derived-from: W11.L2 (F-W11P5-010 closed during codification)

  - id: DF-CONVERGENCE-BEFORE-MERGE-001
    name: convergence-before-merge
    description: >
      Per-story delivery flow MUST NOT merge a story PR before its
      Step-4.5 per-story adversarial convergence is complete (BC-5.39.001:
      3 clean fresh-context passes with zero open HIGH/CRITICAL findings).
      A wave MUST NOT be marked closed or have its STATE.md status
      advanced to a post-active state (e.g., `closed`, `completed`) before
      wave-level adversarial convergence is also complete.

      Specific prohibitions:
        - pr-manager MUST NOT execute `gh pr merge` (or any equivalent
          squash/merge action) for a story PR until the orchestrator has
          confirmed that the per-story adversarial convergence cycle for
          that story has returned a CONVERGED verdict (3 clean passes,
          no deferred HIGH/CRITICAL items).
        - Orchestrator MUST NOT update STATE.md wave status to any
          "ready_to_close" or closed state while any story in the wave
          still has an open convergence cycle or an un-merged PR with
          unresolved adversarial findings.
        - If STATE.md drift is detected (e.g., wave status shows
          `ready_to_dispatch` for a new wave while PRs from the prior
          wave were merged without convergence), the orchestrator MUST
          halt new-wave dispatch, complete retroactive convergence for
          all affected stories, and update STATE.md to accurately
          reflect convergence status before proceeding.

      Detection signals for violations:
        - STATE.md wave status advanced while per-story convergence
          cycles are incomplete.
        - Merge commit SHAs present on develop for stories whose
          per-story convergence report does not exist or shows
          fewer than 3 clean passes.
        - Wave-level convergence report absent when wave is marked closed.

    severity: CRITICAL
    scope:
      - orchestrator
      - pr-manager
      - implementer
    rationale: >
      Wave 16 root-cause evidence (W16.L1): 4 stories (STORY-041/042/
      043/044) were merged to develop without per-story adversarial
      convergence; STATE.md was left stale showing the wave as
      ready_to_dispatch for a new wave. This triggered a retroactive
      convergence session spanning all 4 stories, surfacing process-gap
      findings that should have been caught before merge. The retroactive
      session cost significantly more than pre-merge convergence would
      have. The defect is structural: the per-story delivery flow must
      treat convergence as a hard gate before merge, not a step that can
      be deferred to post-merge.
    enforcement: >
      Orchestrator MUST inject this policy into every pr-manager dispatch
      under a "## Convergence Gate (MANDATORY per
      DF-CONVERGENCE-BEFORE-MERGE-001)" heading. Before authorizing merge
      the orchestrator MUST confirm: (a) per-story convergence report
      exists for the story, (b) the report shows 3 clean passes with
      CONVERGED verdict, (c) no HIGH/CRITICAL findings are marked
      "deferred". If any condition fails, pr-manager MUST NOT merge.
      Wave-close dispatches MUST include a check of STATE.md convergence
      status for ALL stories in the wave before advancing wave status.
    added: "2026-05-28"
    version: v1
    derived-from: >
      W16.L1 (4 Wave-16 stories merged without convergence; retroactive
      convergence session; PG-W16-005)

  - id: DF-DEVELOP-FRESHNESS-001
    name: develop-freshness-before-adversary-dispatch
    description: >
      The orchestrator MUST ensure its local develop branch matches
      `origin/develop` HEAD before EVERY wave-gate AND before EVERY
      wave-level adversarial dispatch. The adversary's first reply MUST
      explicitly report the develop HEAD SHA it reviewed.

      Mandatory procedure:
        - Before each wave-gate check: run `git fetch origin && git log
          origin/develop -1 --oneline` and confirm local HEAD matches.
          If local is behind, run `git pull origin develop --ff-only`
          before proceeding.
        - Before each wave-level adversarial dispatch: include the
          current `origin/develop` HEAD SHA in the dispatch prompt so
          the adversary can self-verify it is reviewing the correct
          branch state.
        - Adversary first reply MUST include a line of the form:
          "Reviewing develop at SHA <sha> (<short-description>)" — this
          is the develop-freshness attestation. If the SHA in the
          adversary reply does not match the orchestrator's known HEAD
          SHA, the orchestrator MUST abort the adversarial pass, refresh
          develop, and re-dispatch.
        - This rule applies to both worktree-scoped adversarial passes
          (per-story) and develop-scoped passes (wave-level). For
          per-story passes, "develop HEAD" means the worktree's base
          commit (the develop SHA the worktree was branched from).

    severity: HIGH
    scope:
      - orchestrator
      - adversary
    rationale: >
      W1.1 + W8.1 merged evidence: stale local develop produced 2
      false-HIGH findings during Wave 8 wave-level pass 3 — the adversary
      reviewed a develop state that did not include recent story merges,
      causing it to flag already-resolved items as open. Diagnosing and
      dismissing false-positives cost approximately 1.5 adversarial passes.
      The pattern is structural: develop advances frequently during a wave
      and an orchestrator running multiple parallel dispatches can easily
      diverge from origin without explicit freshness checks.
    enforcement: >
      Orchestrator MUST include a git-fetch-and-compare step in the
      wave-gate checklist and in the adversarial-dispatch template.
      Adversary's first-reply SHA attestation acts as the machine-readable
      freshness signal. Any adversarial pass whose first reply lacks the
      SHA attestation MUST be flagged as methodology-incomplete and the
      adversary re-dispatched with an explicit "include SHA attestation"
      instruction.
    added: "2026-05-28"
    version: v1
    derived-from: >
      W1.1 + W8.1 (false-HIGH findings from stale develop; merged into
      single policy 2026-05-28)

  - id: DF-ADVERSARY-TOOLCHAIN-PAIRING-001
    name: adversary-toolchain-pairing
    description: >
      The adversary agent runs a read-only profile and CANNOT execute
      `cargo`, `compute-input-hash --check`, or any git-mutating command.
      Any adversarial axis that requires execution evidence (build
      verification, hash computation, test-run output, diff-stat actuals)
      MUST have that evidence supplied by the orchestrator or a paired
      toolchain-runner BEFORE or ALONGSIDE the adversary dispatch — not
      after the adversary has already produced findings based on
      static-only review.

      Mandatory practices:

      Build and hash evidence:
        - For axes requiring "does the code compile?" or "does cargo test
          pass?", the orchestrator MUST run the relevant cargo command in
          the worktree and include the full output (exit code + stderr
          summary) in the adversary dispatch prompt.
        - For axes requiring input-hash validation (story frontmatter hash
          matches actual BC content), the orchestrator MUST run
          `compute-input-hash` or equivalent and include the result in
          the dispatch prompt. The adversary MUST NOT assert hash
          validity without this supplied evidence.

      Scope-of-change accuracy:
        - Dispatch prompts that describe which files changed MUST derive
          the file list from `git diff --stat <base>..<head>` actuals,
          not from manual prose or story frontmatter alone. Manual prose
          is permitted as supplementary context but MUST be flagged as
          "supplementary — see git diff --stat for ground truth".
        - The adversary's scope-verification step MUST confirm the supplied
          diff-stat matches its own read of the worktree vs base SHA. If
          they diverge, the adversary MUST flag a methodology error.

      Pairing protocol:
        - When an adversarial axis cannot be evaluated without execution
          (e.g., "verify all tests pass"), the orchestrator MUST either:
          (a) supply pre-run evidence from a toolchain-runner in the
              dispatch prompt, OR
          (b) run a toolchain-runner in parallel and merge evidence before
              the adversary finalizes findings.
        - The adversary MUST NOT silently skip an execution-dependent axis
          due to read-only profile; instead it MUST flag the axis as
          "EXECUTION-REQUIRED — evidence not supplied" so the orchestrator
          can provide it.

    severity: MEDIUM
    scope:
      - orchestrator
      - adversary
    rationale: >
      Wave 11 evidence (F-W11P4-010/011, F-W11P5-010) and Wave 16 evidence
      (W16.L4): the adversary's read-only profile created silent gaps on
      execution-dependent axes (cargo build status, hash correctness, diff
      scope accuracy). In some cases the adversary made assertions about
      build correctness or hash validity that turned out to be static
      inference rather than verified fact, producing findings that were
      either false-positives or under-specified. The pairing protocol
      ensures execution evidence is always grounded before the adversary
      draws conclusions. Generating dispatch scope from git diff --stat
      actuals (rather than prose) prevents scope-description drift that
      causes the adversary to review a different change set than what
      was merged.
    enforcement: >
      Orchestrator dispatch templates MUST include a "Supplied Evidence"
      section in every adversary dispatch prompt listing: (a) cargo build
      exit code and stderr digest, (b) cargo test summary (pass/fail count),
      (c) git diff --stat output, (d) input-hash check result if applicable.
      Adversary MUST reference this section before making any execution-
      dependent assertion. If a section is absent, the adversary MUST flag
      the omission in its findings and mark the relevant axis as
      EXECUTION-REQUIRED rather than guessing. Orchestrator MUST treat
      EXECUTION-REQUIRED flags as blockers before finalizing the adversarial
      pass report.
    added: "2026-05-28"
    version: v1
    derived-from: >
      F-W11P4-010/011 + F-W11P5-010 (W11 adversary read-only gaps); W16.L4
      (dispatch scope from prose vs actuals); merged into single policy
      2026-05-28

  - id: DF-INPUT-HASH-CANONICAL-001
    name: input-hash-canonical-tool-mandatory
    description: >
      The input-hash field in story frontmatter MUST be computed exclusively
      via `bin/compute-input-hash` using MD5 and inputs in declaration order.
      Hand-computing the hash via sha256, sorted inputs, or any other method
      is FORBIDDEN and produces a divergent hash that will fail at drift-check.

      Mandatory practices:
        - Story-writer dispatch prompts MUST mandate the tool:
          "Run bin/compute-input-hash to compute the input-hash — do NOT
          hand-compute via sha256 or sorted inputs."
        - Product-owner dispatch prompts for BC updates that change a
          story's BCs MUST mandate hash recomputation via the tool.
        - After any BC content update that affects a story's `bcs:`
          frontmatter list, the story input-hash MUST be recomputed with
          bin/compute-input-hash before commit.
        - The tool invocation and result MUST be reported in the burst report.

    severity: HIGH
    scope:
      - orchestrator
      - story-writer
      - product-owner
      - dispatch-templates
    rationale: >
      PG-HASH-001 evidence (2026-05-29): story-writer hand-computed hashes
      using sha256 with sorted inputs this session, diverging from the
      canonical MD5/inputs-order algorithm used by bin/compute-input-hash.
      12 stories were left with stale hashes before the drift was caught;
      a bulk scan (MATCH=48 STALE=0) confirmed remediation. The root cause
      is that story-writer and product-owner dispatch prompts did not
      explicitly mandate the tool — agents fell back to manual computation.
    enforcement: >
      Orchestrator MUST inject "Run bin/compute-input-hash — do NOT
      hand-compute" into every story-writer and product-owner dispatch
      prompt. Drift-check at Phase-4 entry is a manual `bin/compute-input-hash
      --scan` step (not a develop CI job). The tool is at bin/compute-input-hash
      (MD5/inputs-order algorithm); its algorithm is documented in CLAUDE.md
      "Input Hash Computation" section and the tool's own --help docstring.
    added: "2026-05-30"
    updated: "2026-05-31"
    status: ACTIVE
    tool-status: >
      bin/compute-input-hash is PRESENT and canonical. Merged via PR #167;
      develop HEAD 45fe526 (2026-05-31). The tool is the spec: MD5 of
      LF-normalized concatenated declared-input file CONTENTS in declaration
      order, first 7 hex chars.
    corpus-status: >
      Full re-baseline completed 2026-05-31. MATCH=48 STALE=0.
      All 48 story input-hashes rewritten via bin/compute-input-hash --write
      --scan. No story versions bumped (hash rewrite is mechanical, not
      semantic). Resolves F-W21-TOOL-001 (HIGH) and F-W21-S079-HASH (MEDIUM).
    derived-from: >
      PG-HASH-001 (12 stories left tool-stale 2026-05-29; fixed, MATCH=48
      STALE=0; codified 2026-05-30). Full 48-story re-baseline 2026-05-31
      after BC edits (33451ed) changed story inputs corpus-wide.

  - id: DF-ADVERSARY-CHECKOUT-GUARD-001
    name: adversary-per-story-checkout-guard
    description: >
      Every per-story adversary dispatch MUST include a checkout-guard
      step that asserts the adversary is operating on the correct branch
      and the correct codebase state before producing any findings.

      Mandatory checkout-guard components:
        1. Branch assertion: verify `git -C <worktree> branch --show-current`
           returns `feature/STORY-NNN` (or the story's specific worktree
           branch name). If not, the adversary MUST abort and report a
           methodology error — do NOT produce findings from the wrong branch.
        2. Grep-count assertion: verify a known story-specific grep-count
           (e.g., expected number of BC-prefixed test functions for this
           story) against the worktree. If the count diverges significantly
           from the expected value, flag as methodology-suspect.
        3. .factory artifact paths: .factory/ is gitignored in worktrees.
           Dispatch MUST provide absolute main-repo paths for all factory
           artifacts (e.g., /Users/zious/.../wirerust/.factory/stories/
           STORY-NNN.md, NOT a worktree-relative path). The adversary
           MUST read factory artifacts from the main-repo path.

      The checkout-guard output MUST appear in the adversary's first reply
      before any findings are listed. A findings report that lacks the
      checkout-guard attestation MUST be treated as methodology-incomplete.

    severity: HIGH
    scope:
      - orchestrator
      - adversary
      - dispatch-templates
    rationale: >
      PG-W18-001 evidence (STORY-054 pass-10): adversary reviewed develop
      HEAD instead of feature/STORY-054 worktree, producing 3 false-CRITICAL
      findings. This is a recurrence of DF-ADVERSARY-METHODOLOGY-001 (first
      caught W11 P5). Pass-11 checkout-guard (branch assertion + grep-count
      assertion) succeeded and confirmed the false-positive nature of pass-10
      findings. The checkout-guard is a structural extension of
      DF-ADVERSARY-METHODOLOGY-001's absolute-path discipline — it adds an
      explicit pre-finding assertion step that catches wrong-checkout silently.
    enforcement: >
      Orchestrator MUST inject the checkout-guard template into every
      per-story adversary dispatch prompt as the first mandatory step
      (before any analysis). The template must include the expected branch
      name, the expected grep-count with the grep command, and the absolute
      main-repo path for factory artifacts. If the adversary's first reply
      lacks the checkout-guard output or reports wrong values, orchestrator
      MUST abort the pass and re-dispatch with corrected prompt.
    added: "2026-05-30"
    derived-from: >
      PG-W18-001 (DF-ADVERSARY-METHODOLOGY-001 recurrence STORY-054 pass-10;
      3 false-CRITICAL; codified 2026-05-30)

  - id: DF-TEST-CITATION-SWEEP-001
    name: test-citation-change-full-occurrence-sweep
    description: >
      When any AC test-citation (a test name or AC-NNN reference) is
      re-pointed or corrected, ALL of the following artifact locations
      MUST be swept and updated in the SAME burst before declaring the
      fix complete:

        1. Story body — AC `**Test:**` lines in the affected AC row(s)
        2. Story FSR rows — File Structure Reference rows that cite the
           test name or AC label
        3. BC Proof-Method / Evidence fields — for ALL BCs in the story's
           `bcs:` frontmatter list (not just the BC whose anchor changed)
        4. Test-file index/header comments — per-story section header
           comments in the test file that map AC labels to test function names
        5. Sibling BC Evidence columns — any BC that cites the same test
           function or AC label in its Proof-Method, Evidence, or
           Architecture Anchor field

      A burst that fixes only 1-2 of these locations is incomplete and
      will be caught as a new adversarial finding in the next pass.
      The sweep must be executed with grep commands before committing.

    severity: HIGH
    scope:
      - orchestrator
      - story-writer
      - test-writer
      - product-owner
    rationale: >
      PG-W18-002 evidence (STORY-056 + STORY-058): AC-013 mis-citation
      existed across 3 distinct locations (story FSR, BC-2.07.004 Evidence,
      tls_analyzer_tests.rs index header comment). Each burst fixed only
      1-2 locations; adversary found the 3rd each time. STORY-058 required
      passes 3/4/5/6/8 (5 extra passes) to chase the same AC-013 mis-mapping.
      Root cause: DF-SIBLING-SWEEP-001 covers BC sibling-sweeps and
      STORY Architecture-Mapping sweeps but did not explicitly enumerate
      test-file index/header comments as a sweep target.
    enforcement: >
      Orchestrator MUST inject this policy's sweep checklist into every
      story-writer and product-owner dispatch that re-points a test citation.
      The agent MUST execute all 5 grep commands above and report results.
      Any unfixed hit is a scope-incomplete regression; do NOT commit until
      all hits are resolved.
    added: "2026-05-30"
    derived-from: >
      PG-W18-002 / W18-S058.L1 (AC-013 mis-citation cascade 5 extra passes;
      codified 2026-05-30); extends DF-SIBLING-SWEEP-001 for test-citation
      occurrence coverage

  - id: DF-TEST-NAMESPACE-001
    name: analyzer-test-per-story-mod-wrappers
    description: >
      Analyzer test files MUST use per-story `mod` wrappers (not a flat
      namespace) to prevent test-function name collisions across stories.

      This convention applies to:
        - tests/tls_analyzer_tests.rs
        - tests/http_analyzer_tests.rs
        - Any future analyzer test files added to tests/

      Each story's tests MUST be grouped inside a dedicated module:
        ```rust
        mod story_NNN {
            use super::*;
            // all tests for STORY-NNN
        }
        ```

      The per-story `mod` wrapper ensures that BC-prefixed test function
      names (e.g., `test_BC_2_07_033_...`) remain unique across stories
      even when two stories test related BCs with similar naming patterns.

      Existing flat-namespace test files (tests/tls_analyzer_tests.rs)
      MUST be refactored to per-story mod wrappers before the next story
      that would risk a name collision is delivered.

    severity: MEDIUM
    scope:
      - test-writer
      - story-writer
      - orchestrator
    rationale: >
      PG-W18-003 evidence (F-W18-WAVE-I-006): tests/tls_analyzer_tests.rs
      uses a flat namespace while tests/http_analyzer_tests.rs uses per-story
      `mod` wrappers (the F-W16 collision fix that required retroactive PR
      #146). As more TLS stories deliver tests into the same flat namespace,
      the probability of name collisions grows. A retroactive rename PR
      similar to PR #146 — touching all existing TLS story tests — becomes
      more expensive with each wave. Proactive codification before collision
      is the correct posture.
    enforcement: >
      Test-writer dispatch templates MUST include: "Use per-story mod wrapper
      per DF-TEST-NAMESPACE-001 — do NOT add tests at the flat module root."
      Adversary MUST flag any new test function added to a flat namespace
      (no enclosing mod block) as MEDIUM process-gap with pointer to this
      policy. Orchestrator MUST schedule tls_analyzer_tests.rs mod-wrapper
      refactor as a standalone chore PR before Wave 22.
    added: "2026-05-30"
    derived-from: >
      PG-W18-003 / F-W18-WAVE-I-006 (TLS flat namespace vs HTTP per-story
      mod wrappers; latent collision risk; codified 2026-05-30)

  - id: DF-CANONICAL-FRAME-HOLDOUT-001
    name: canonical-frame-holdout-cross-validation
    description: >
      For any behavioral contract that asserts a PROTOCOL-FRAMING invariant
      (bit-field/byte-position semantics of a wire protocol — e.g. DNP3 link-control
      DIR/PRM bits, frame headers, length fields), at least one holdout scenario AND
      at least one test MUST use a CANONICAL byte sequence taken from the AUTHORITATIVE
      protocol specification (e.g. IEEE 1815 for DNP3), NOT a byte value derived from
      the project's own BCs or tests.

      The holdout scenario MUST:
        - Cite the protocol specification section that defines the bit/byte layout.
        - State the canonical byte value explicitly (e.g. "DIR bit is bit 7 per
          IEEE 1815 §8.2.1 — canonical master-to-outstation frame uses DIR=1,
          therefore byte 1 of the link-layer header = 0x44 | 0x80 = 0xC4").
        - Be authored INDEPENDENTLY of the project's BCs and test vectors —
          i.e., the holdout author MUST consult the authoritative spec directly,
          NOT read the project's BC postconditions or existing tests to derive
          the byte value.

      Stories implementing protocol-framing invariants MUST include in their
      acceptance criteria: "At least one test uses a canonical byte sequence
      from the authoritative protocol specification for the framing invariant
      under test, with the spec section and byte value cited."

      F3 story decomposition MUST flag any story whose BCs include a
      PROTOCOL-FRAMING invariant and add the canonical-byte holdout requirement
      to that story's AC before decomposition is finalized.

    severity: CRITICAL
    scope:
      - orchestrator
      - holdout-authorship
      - adversary
      - story-writer
      - f3-decomposition
    rationale: >
      PG-F4-F5-001 root-cause evidence (Feature #8 DNP3, 2026-06-12): the
      is_master_frame DIR-bit mask was wrong (0x10 instead of 0x80 — DIR is bit
      7 per IEEE 1815 DNP3, not bit 4). The bug was latent since STORY-107
      (wave 36) and survived approximately 30 per-story adversarial passes across
      STORY-107, 108, 109, and 110. Root cause: the per-story adversary reviews
      code against the project's own BC and tests. The BC (PC5) and the tests both
      used the same wrong mask — an internally self-consistent error that per-story
      review cannot catch because the adversary has no external reference. The fix
      was found by the F5 agentic-sliced pre-implementation review, which
      cross-checked the mask against the DNP3 link-layer bit layout in IEEE 1815
      independently. Canonical-spec cross-validation breaks the shared-assumption
      loop: if one holdout scenario had been authored from IEEE 1815 directly, the
      mask error would have been caught at F3 decomposition, not F5.
    enforcement: >
      F3 decomposition checklist MUST include: "For each BC in this story's spec
      that asserts a PROTOCOL-FRAMING invariant, add an AC requiring at least one
      test with a canonical byte sequence from the authoritative protocol spec (cite
      spec section + byte value)." Holdout authorship (F3) MUST include at least one
      scenario per framing-invariant BC that uses a spec-derived byte value. F4/F5
      adversary MUST verify the canonical-byte test exists and its byte value is
      correct against the cited spec section. A missing canonical-byte test for any
      framing-invariant BC is a HIGH adversarial finding at F4 and a P0 BLOCKER at
      F5. The F5 adversary MUST NOT accept a byte value derived from the project's
      own BCs as a substitute for a canonical spec citation.
    added: "2026-06-12"
    version: v1
    derived-from: >
      PG-F4-F5-001 (Feature #8 DNP3 DIR-bit 0x10→0x80 mask bug; 30+ per-story
      passes missed; found F5 canonical cross-check; codified 2026-06-12;
      lessons.md IP-1 / PG-F4-F5-001)

  - id: DF-BC-COMPLETENESS-SWEEP-001
    name: bc-set-completeness-sweep-at-f5
    description: >
      Per-story adversarial review verifies only what EXISTS — it cannot detect
      an entirely-absent feature. At the feature-level scoped-adversarial (F5)
      gate, the reviewer MUST perform a BC-set completeness sweep as the FIRST
      mandatory step before any per-finding analysis.

      Mandatory F5 completeness sweep procedure:
        1. Enumerate every behavioral contract in the feature's spec (the full
           SS-NN BC set for the feature being reviewed).
        2. For each BC that specifies a detection invariant, guard condition,
           emission requirement, or named behavioral postcondition, confirm that
           a corresponding implementation path EXISTS in the feature delta.
        3. "Corresponding implementation path" means: a named symbol, branch,
           function, or match arm can be found in the changed source files that
           could produce the behavior described in the BC's postcondition. A
           grep for the postcondition's named symbol/branch is the minimum
           verification step.
        4. Any BC Invariant / Postcondition / Precondition with NO corresponding
           implementation path is a P0 BLOCKER finding. It is NOT sufficient
           for earlier per-story passes to have been CLEAN — per-story passes
           verify correctness of what was implemented, not completeness of what
           was specified.
        5. Report the sweep result in the F5 findings section as: "BC-set
           completeness sweep: [N] BCs checked, [N] with implementation path,
           [N] with no implementation path (BLOCKER)."

      This sweep is ADDITIVE to per-finding analysis — it must run even if all
      per-story passes were CLEAN and no individual story raised completeness
      concerns.

    severity: HIGH
    scope:
      - orchestrator
      - adversary
      - f5-scoped-adversarial
    rationale: >
      PG-F4-F5-002 root-cause evidence (Feature #8 DNP3, 2026-06-12):
      BC-2.15.010 Invariant 5 (unexpected-source detection — a P0 holdout
      requirement) was ENTIRELY UNIMPLEMENTED after 5 stories (STORY-106..110)
      were delivered. None of the approximately 34 per-story adversarial passes
      across the 5 stories detected this gap. Each per-story pass correctly
      verified that existing detection branches satisfied their own BCs; none
      checked whether Invariant 5 had any corresponding code path at all. The
      F5 holistic adversarial review found the gap by scanning the full delta
      for coverage of each BC Invariant — a structural difference from per-story
      review. A single BC-set completeness sweep at F5 entry would have caught
      this gap before any remediation work was needed.
    enforcement: >
      Orchestrator MUST inject the following block into every F5 adversary
      dispatch prompt as the MANDATORY FIRST STEP:
      "## BC-Set Completeness Sweep (MANDATORY per DF-BC-COMPLETENESS-SWEEP-001)
      Before any per-finding analysis, enumerate ALL BCs in the feature's spec
      (SS-NN set). For each BC Invariant/Postcondition/Precondition, grep the
      feature delta for a corresponding implementation path. Any BC with NO
      implementation path is a P0 BLOCKER. Report the sweep result before
      proceeding to per-finding analysis."
      The F5 findings report MUST include the sweep result table. A findings
      report that skips or omits the completeness sweep is methodology-incomplete
      and MUST be flagged by the orchestrator before accepting the findings.
      This policy extends DF-ADVERSARY-METHODOLOGY-001 by adding BC-completeness
      as a numbered step at F5; the DF-ADVERSARY-METHODOLOGY-001 enforcement
      section should reference this policy for F5 contexts.
    added: "2026-06-12"
    version: v1
    derived-from: >
      PG-F4-F5-002 (Feature #8 BC-2.15.010 Invariant-5 entirely unimplemented
      after 34 per-story passes; found F5 holistic delta scan; codified 2026-06-12;
      lessons.md IP-2 / PG-F4-F5-002)

  - id: DF-GREEN-DOC-TENSE-SWEEP
    name: green-step-doc-tense-sweep-mandatory
    description: >
      TDD-phase doc-comments written during RED-gate/scaffold/stub phases MUST be
      converted to GREEN/past-tense accurate language at the implementer's Green step,
      BEFORE committing and BEFORE adversary dispatch. Stale RED-state prose on a
      passing implementation is a MEDIUM adversarial finding — it misleads reviewers
      about implementation state and constitutes a specification accuracy defect.

      Mandatory practices:

      (a) Implementer GREEN-step sweep (mandatory before GREEN commit):
        - Grep ALL files in the story's own diff (git diff develop..HEAD --name-only)
          for: "scaffold", "Red Gate", "RED GATE", "RED gate", "todo!()", "stub",
          "uncalled", "skeleton", and any stale counts that this story changes.
        - Every matching doc-comment MUST be converted to accurate GREEN or
          past-tense provenance language before commit.
        - Exception: doc-comments that describe genuinely-deferred artifacts
          (e.g., F6 Kani stubs, explicitly-deferred ACs) may retain future-tense
          prose — those MUST name the deferral target (e.g., "F6 deferred").

      (b) Regression-test authoring sub-rule (PG-ARP-F4-REDTEST-DOC-TENSE):
        - When a fix commit ADDS new regression/RED tests simultaneously with fixing
          the code, the test-writer MUST author all test doc-comments in
          REGRESSION-GUARD framing FROM THE START — before committing.
        - The failing assertion IS the RED signal; the prose must read as accurate at
          GREEN time.

          PREFERRED framing: "This test guards against regression of X. It FAILS if a
          future refactor removes Y."

          FORBIDDEN framing: "This test currently fails / the code currently lacks X /
          this MUST FAIL until X is fixed."

        - The GREEN-step doc sweep MUST re-read every doc-comment in any
          newly-added test function and verify it reads as accurate at GREEN time,
          not at the RED moment when the test was mentally authored. Newly-added test
          files are diff files and are in scope for the sweep.

      (c) Stub-architect and test-writer authoring guidance:
        - SHOULD author provenance prose in past tense or clearly-future-gated form
          from the start: "This function body is deferred to F6 (todo!())" rather
          than "RED GATE — stubs uncalled". This eliminates the entire class at
          the source.
        - Where present-tense transitional language is unavoidable in RED phase,
          annotate: "// TODO-GREEN: update this comment at GREEN step."

      (d) Adversary doc-accuracy axis:
        - MUST explicitly flag surviving "scaffold / Red Gate / stub / todo!() /
          uncalled" module-level, test-banner, or in-test doc-comment language as
          MEDIUM (not LOW cosmetic).
        - MUST flag stale count references (e.g., "23 IDs" after a 23→25 bump) as
          MEDIUM regardless of proximity to functional correctness issues.
        - MUST flag present-tense-false RED prose on a PASSING test as MEDIUM —
          e.g., "this test currently fails / must fail until X" when the test is
          green.

    severity: HIGH
    scope:
      - implementer
      - test-writer
      - stub-architect
      - adversary
      - dispatch-templates
    rationale: >
      HIGH RECURRENCE (~7x across ARP feature cycle STORY-112 through STORY-115).
      Each recurrence required a fix commit and a full adversarial-pass restart,
      costing at minimum one extra adversarial dispatch per story.

      Affected artifact classes across recurrences:
        - STORY-112: per-test section banners (RED-gate present-tense) — PG-ARP-F4-REDBANNER-SWEEP
        - STORY-113 O-4: module header + integration-test doc-comments ("skeleton/Red-Gate stubs") — PG-ARP-F4-STALE-SKELETON-DOC
        - STORY-114 F-1: arp.rs module header ("scaffold / Red Gate / uncalled todo!() stubs / mitre untouched 23/15")
        - STORY-114 F-2: test-module banners + per-test RED-gate doc-comments
        - STORY-114 F-3: mitre.rs Kani-proofs section ("23 IDs" stale count post-bump)
        - STORY-115: newly-added GARP-flood regression test doc-comment
        - STORY-115: newly-added LRU guard regression test doc-comment

      The STORY-115 sub-class (PG-ARP-F4-REDTEST-DOC-TENSE) is a new variant:
      the fix commit adds a regression test with present-tense RED prose, the
      GREEN-step sweep misses the just-added test's own comments, and two successive
      "fix the doc on the newly-added test" commits are required. This variant was
      missed by DF-GREEN-DOC-TENSE-SWEEP's original formulation because the sweep
      focused on pre-existing files in the diff, not test functions added within
      the same fix commit.
    enforcement: >
      Orchestrator MUST inject the GREEN-step sweep mandate into every implementer and
      test-writer dispatch: "Before committing the GREEN implementation, run a doc-tense
      sweep over ALL files in `git diff develop..HEAD --name-only`, INCLUDING any
      newly-added test functions. Grep for: scaffold, Red Gate, RED GATE, todo!(),
      stub, uncalled, skeleton, and any stale count values this story changes. Fix ALL
      hits. Only F6-deferred or explicitly-named-deferred comments may retain
      future-tense prose." Adversary MUST flag surviving stale RED prose as MEDIUM,
      not LOW. The three-pass requirement (BC-5.39.001) is retained: STORY-115 evidence
      confirms that pass 1 missed a whole-attack-class bypass (GARP-storm detection
      unreachable) that passes 2 and 3 caught via fresh-context + BC-completeness sweep.
    added: "2026-06-15"
    version: v1
    derived-from: >
      PG-ARP-F4-REDBANNER-SWEEP (STORY-112); PG-ARP-F4-STALE-SKELETON-DOC (STORY-113);
      STORY-114 Step-4.5 F-1/F-2/F-3 (codified 2026-06-15 in lessons.md);
      PG-ARP-F4-REDTEST-DOC-TENSE sub-rule (STORY-115 Step-4.5; newly-added regression
      test doc-comment missed by GREEN-step sweep; codified 2026-06-15)

  - id: DF-CONSISTENCY-AUDIT-POST-FIXBURST-001
    name: consistency-audit-after-fix-burst-or-bc-enrichment
    description: >
      A spec-coherence consistency audit (consistency-validator full-corpus
      sweep, minimum 6 dimensions) MUST be run:

        (a) After any fix-burst that shifts source-code line numbers (e.g.,
            code insertions, deletions, function renames, or test additions
            that move existing code). Anchor citations across the entire spec
            corpus must be verified against the post-burst source tree.

        (b) After any BC H1/title enrichment pass (e.g., renaming a BC's
            top-level heading to match a new function name or updated contract
            semantics). Title changes propagate to BC-INDEX, VP-INDEX, PRD RTM
            rows, and story bodies — all of which must be swept in the same burst.

      The 6 minimum dimensions for the consistency audit are:

        1. Source-line anchor citations (src/tests/fuzz paths:NNN) vs current tree
        2. BC H1/title propagation (BC-INDEX, VP-INDEX, ARCH-INDEX, prd.md RTM)
        3. VP prose vs verification harness (semantics, not just naming)
        4. Story body Architecture-Mapping anchors vs BC anchor citations
        5. Input-hash drift check (bin/compute-input-hash --scan) after any BC content change
        6. Index row counts match actual file counts (BC-INDEX total, VP-INDEX total)

      This audit is a GATE requirement at Phase-6 entry and at every fix-burst
      during Phase-5 adversarial refinement. It is the durable preventive
      equivalent of the reactive sweeps that were triggered by adversarial
      findings across Passes 1–11.

      MUST: The audit MUST be run and its output recorded in the burst-log
      before declaring any Phase-5 or Phase-6 remediation burst CLOSED.

      SHOULD: The audit SHOULD be run in Phase-3 wave-gate checks when the
      burst touched more than one subsystem's source files.

    severity: HIGH
    scope:
      - orchestrator
      - state-manager
      - product-owner
      - story-writer
      - adversary
    rationale: >
      PROCESS-GAP-P5-001 root-cause evidence: across 11 adversarial passes,
      anchor and coherence gaps recurred after every fix-burst — 32 BCs
      (Pass 1), 2 BCs secondary anchors (Pass 2), 28 citations/8 files
      consuming VP/invariant/supplement/entity (Pass 3), 83 citations/44 files
      test-file dimension (Pass 8), BC function-name + test docstring coherence
      (Pass 10), VP-015 prose vs harness + BC-2.04.013 title-sync gaps in
      INDEX/PRD (Pass 11). Every sweep was reactive (triggered by adversarial
      finding) rather than preventive. The comprehensive post-P11 consistency
      audit (698 citations, 20 VPs, 6 dims) found only 2 residual findings
      (F-AUDIT-001/002) — demonstrating that a proactive full-corpus sweep
      catches the long tail cheaply. STORY-091 (E-11) builds mechanical tooling
      (bin/validate-anchors) to automate dimension 1 of this audit.
    enforcement: >
      Orchestrator dispatch templates for fix-bursts and BC-enrichment tasks
      MUST include a "## Post-Burst Consistency Audit (MANDATORY per
      DF-CONSISTENCY-AUDIT-POST-FIXBURST-001)" checklist item. The state-manager
      MUST refuse to mark a Phase-5 or Phase-6 remediation burst CLOSED in
      STATE.md until the burst-log records the consistency-audit results.
      At Phase-6 entry, the orchestrator MUST run or confirm a full 6-dimension
      audit on the then-current develop HEAD before dispatching any formal
      hardening agents.
    references:
      - PROCESS-GAP-P5-001
      - STORY-091
    added: "2026-06-01"
    version: v1
    derived-from: >
      PROCESS-GAP-P5-001 (11 Phase-5 adversarial passes surfacing recurring
      anchor/coherence drift; comprehensive post-P11 audit exemplar; S-7.02
      cycle-close disposition codified 2026-06-01); STORY-091 AC-011.
