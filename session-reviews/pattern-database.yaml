---

patterns:

  - id: PAT-001
    name: pr-manager-shortstop
    description: >
      pr-manager agent stops at step 6 (APPROVE) without executing steps 7-9
      (merge + confirm CI + consolidated report). Requires orchestrator
      SendMessage intervention to complete.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-8-dnp3-v0.5.0"
        count: 1
        notes: "DNP3 F5 PR — seeded the pattern"
      - cycle: "feature-arp-v0.7.0"
        count: 5
        notes: "PRs #236/#238/#239/#240/#241 — 5/5 ARP story PRs"
    total_occurrences: 6
    recurrence_rate: "100% (6/6 PRs in scope)"
    proactive_mitigation_tried: true
    mitigation_effective: false
    mitigation_notes: >
      Explicit 'DO NOT STOP AT APPROVE' instruction in STORY-115 dispatch
      did not prevent recurrence #6. Structural prompt change required.
    severity: CRITICAL
    proposal: PROP-01
    status: OPEN

  - id: PAT-002
    name: doc-tense-recurrence
    description: >
      RED-gate / scaffold / stub / todo!() doc-comments written in TDD RED
      phase survive into adversary-surfaced GREEN commits. Recurs after
      policy-text codification (DF-GREEN-DOC-TENSE-SWEEP), confirming that
      policy text alone does not change agent behavior.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-arp-v0.7.0"
        count: 7
        notes: >
          STORY-112 (PG-ARP-F4-REDBANNER-SWEEP), STORY-113 (O-4),
          STORY-114 F-1/F-2/F-3, STORY-115 C1/F-1 regression tests,
          D-075 regression test (post-codification recurrence)
    total_occurrences: 7
    policy_codified: true
    policy_id: DF-GREEN-DOC-TENSE-SWEEP
    policy_effective: false
    notes: >
      Policy was codified before STORY-115 began; recurred immediately
      in D-075 regression test. Requires agent-prompt injection.
    severity: HIGH
    proposal: PROP-02
    status: OPEN

  - id: PAT-003
    name: fix-induced-regression-from-low
    description: >
      A LOW-severity finding adjudicated FIX without assessing
      fix-induced-regression risk. The fix requires hand-rolling logic
      that the library already abstracts, introducing a MEDIUM regression.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-arp-v0.7.0"
        finding: "O-A (LOW) → D-078/D-078b + F-1 (MEDIUM)"
        cost: "3 PRs (#247/#248/#249) + 2 F5 streak resets + 1 MEDIUM regression"
    total_occurrences: 1
    severity: HIGH
    proposal: PROP-03
    status: OPEN

  - id: PAT-004
    name: consumer-sweep-gap-post-fixburst
    description: >
      A rename or canonical-symbol update in a BC/VP/spec does not propagate
      to all consuming artifacts. Gap caught reactively by consistency-validator
      rather than proactively by fix agent.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-arp-v0.7.0"
        instance: "VP-024 v1.8 harness rename (PG-ARP-FIXBURST-CONSUMER-SWEEP)"
        resolution: "revert rename via PR #246"
      - cycle: "feature-arp-v0.7.0"
        instance: "F6 lock + Sub-D surrogate name (PG-CONSISTENCY-AUDIT-CONSUMER-SWEEP)"
        resolution: "caught by F7 consistency-validator; 4 gaps remediated"
    total_occurrences: 2
    severity: HIGH
    proposal: PROP-04
    status: OPEN

  - id: PAT-005
    name: holdout-catches-value-semantics-misses
    description: >
      Holdout evaluation catches field-value semantics defects (e.g., Verdict::Possible
      vs Verdict::Likely) that consistency-validator misses because the validator
      checks structure, not value. Demonstrates tool complementarity.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-arp-v0.7.0"
        finding: "D-075 — D1 verdict Possible vs Likely; caught by holdout static scenarios"
        missed_by: ["consistency-validator", "4 prior adversary passes"]
    total_occurrences: 1
    severity: HIGH
    proposal: null
    notes: >
      Positive validation of holdout design; no workflow change needed.
      Reference when justifying holdout overhead.
    status: DOCUMENTED-POSITIVE

  - id: PAT-006
    name: multipass-adversary-catches-single-pass-misses
    description: >
      Multi-pass adversarial convergence (3 fresh-context passes) catches whole-attack-class
      structural gaps that single-pass review misses. Provides concrete evidence for
      retaining 3-pass requirement.
    first_observed: "feature-arp-v0.7.0"
    occurrences:
      - cycle: "feature-arp-v0.7.0"
        finding: "GARP-storm bypass (C1 in STORY-115) — missed by pass 1, found by passes 2/3"
        mechanism: "DF-BC-COMPLETENESS-SWEEP + GARP/D3 interaction axis"
      - cycle: "feature-arp-v0.7.0"
        finding: "D-077 CRITICAL — missed by 4 passes + holdout; found by human-directed re-streak"
    total_occurrences: 2
    severity: HIGH
    proposal: null
    notes: >
      Positive validation of 3-pass and BC-completeness-sweep requirements.
      Reference when justifying adversary convergence overhead.
    status: DOCUMENTED-POSITIVE

  - id: PAT-007
    name: f7-doc-spec-currency-wave
    description: >
      Multiple fix-bursts landing during F7 each generate a downstream consuming-surface
      propagation gap that the next adversary round finds. The resulting cascade extends
      F7 by 1-2 rounds per burst. Root cause: fix-bursts during F7 are dispatched with
      a narrow remediation scope and do not include a post-burst consuming-surface sweep.
      DF-CONSISTENCY-AUDIT-POST-FIXBURST-001 policy exists but is not enforced as a
      blocking checklist item at the point of dispatch.
    first_observed: "feature-story-119-grouped-collapse"
    occurrences:
      - cycle: "feature-story-119-grouped-collapse"
        count: 4
        notes: >
          R1 (CHANGELOG/release-config) -> R2 (provenance-leak + #[non_exhaustive]) ->
          R3 (ADR anchor drift) -> R4 (BC Architecture Anchors + story post-delivery notes).
          Each burst generated its own propagation gap found in the next round.
    total_occurrences: 1
    severity: HIGH
    proposal: PROP-E18-01
    status: OPEN

  - id: PAT-008
    name: release-config-approval-prompt-self-falsification
    description: >
      release-config.yaml human_approval_prompt embeds a point-in-time status snapshot
      (e.g., "Round-2 pending / remediation-in-flight") that self-falsifies when the
      state advances. The opener "All quality gates are satisfied" may be copied from a
      prior template without matching the current held/in-progress status.
    first_observed: "feature-story-119-grouped-collapse"
    occurrences:
      - cycle: "feature-story-119-grouped-collapse"
        notes: >
          F7-R2 Pass C findings F-PASSC-001/2/3 -- remediated via D-130 burst.
          Codified: prompt MUST reference STATE.md as source-of-truth, not embed inline status.
    total_occurrences: 1
    severity: MEDIUM
    proposal: null
    status: RESOLVED-CODIFIED

  - id: PAT-009
    name: adversary-stale-git-ref-false-alarm
    description: >
      Adversary subagents operating in isolated sandboxes can report a stale git HEAD SHA
      while reviewing the correct live file contents. This generates a false-alarm finding
      that consumes one remediation burst before being closed. Confirmed mitigation:
      orchestrator supplies verified HEAD SHA in adversary dispatch prompt preamble.
    first_observed: "feature-story-119-grouped-collapse"
    occurrences:
      - cycle: "feature-story-119-grouped-collapse"
        notes: "D-105 -- F5 post-merge anchor re-validation against spec-branch HEAD"
      - cycle: "feature-story-119-grouped-collapse"
        notes: "E-8 F7 consistency audit stale-field instance"
      - cycle: "feature-story-119-grouped-collapse"
        notes: >
          F7-R4 Pass C (D-131) -- adversary reported develop HEAD == 31d1231/8696448
          when actual was 1c89b52. Closed as false alarm; confirmed mitigation applied in R5
          (orchestrator supplied verified HEAD; R5 found 0 findings).
    total_occurrences: 3
    confirmed_mitigation: >
      Orchestrator supplies `git rev-parse HEAD` at dispatch time; adversary preamble
      states "treat <SHA> as ground truth if your tooling differs."
    mitigation_applied_in: "F7-R5 (zero SHA discrepancy reported; R5 CLEAN)"
    severity: MEDIUM
    proposal: PROP-E18-02
    status: OPEN

