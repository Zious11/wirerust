# .factory/release-config.yaml
# Release configuration for wirerust.
# Read by the vsdd-factory:release skill (schema: 1).
#
# Human choices confirmed (release-prep R-2, 2026-06-08):
#   - GitHub Release: ENABLED (with cross-compiled binary artifacts)
#   - crates.io publish: DISABLED
#   - Autonomy: pause-before-publish (human sign-off required before tag)
#
# DevOps note (updated 2026-06-12): .github/workflows/release.yml EXISTS and
# auto-built 4 binary artifacts for v0.6.0 on the v0.6.0 tag push
# (aarch64-apple-darwin, x86_64-apple-darwin, x86_64-pc-windows-msvc,
# x86_64-unknown-linux-gnu). The prior note claiming release.yml was missing
# was stale and has been corrected. ci_workflow below is updated to release.yml.

schema: 1

product: wirerust
description: "Fast PCAP forensics and network triage CLI tool (network pcap traffic analyzer CLI)"

# ── Version source ────────────────────────────────────────────────────────────
packages:
  - name: wirerust
    path: "."
    version_sources:
      - file: Cargo.toml
        format: toml
        # TOML path: [package].version
        path: package.version

# ── Tag and branch conventions ────────────────────────────────────────────────
versioning:
  # Tag format: v{version}  →  v0.1.0
  tag_format: "v{version}"
  # Development branch (PRs land here)
  development_branch: develop
  # Release branch (tag lives here; release flow merges develop → main, then tags main)
  release_branch: main
  # git-flow: merge develop into main, then tag on main before publishing
  strategy: git-flow-merge

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  file: CHANGELOG.md
  format: keep-a-changelog
  # Release notes for GitHub Release are extracted from the [0.1.0] section.
  # The section was authored manually and is already present in CHANGELOG.md.
  source: changelog_section

# ── Quality gates ─────────────────────────────────────────────────────────────
quality_gates:
  # vsdd-partial: convergence + human approval; no automated holdout/formal re-check
  # (those gates are already recorded in STATE.md / phase-7-convergence-report.md)
  mode: vsdd-partial

  # Phase-7 / F7 convergence gate PASSED (human-approved — D-045 greenfield; D-109 E-8 F7
  # HUMAN GATE; D-128 E-18 F5 gate SATISFIED; F6 hardening complete).
  # The release skill checks STATE.md for a recorded convergence report; the
  # file is at .factory/cycles/feature-story-119-grouped-collapse/ (F7 delta convergence
  # for E-18 grouped-collapse, v0.9.0).
  require_convergence: true
  min_convergence_dimensions: 5     # F7: 5-dim (spec/tests/impl/verification/docs)

  # Holdout PASSED for all prior cycles. Recorded in phase-4 summaries.
  require_holdout: false            # already satisfied; not re-checked at release
  min_holdout_satisfaction: 0.90    # reference value — used if re-check is enabled

  # F6 HARDENED — mutation 85%+ on terminal.rs + main.rs; VP-012 escape proptest
  # passing (4 harnesses, 1000 cases each); Kani + fuzz parsers provably unaffected
  # (delta touches only reporter/terminal.rs + main.rs); NO new VP required.
  require_formal_verification: false  # already satisfied; not re-checked at release

  # F5 scoped-adversarial 3/3 SATISFIED (STORY-120/122/119 E-18 grouped-collapse).
  require_adversarial_passes: false   # already satisfied

  # CRITICAL: pause-before-publish — human must approve before tag is pushed.
  # This is the irreversibility gate: once the tag hits origin and the GitHub
  # Release is created, it is public and permanent.
  require_human_approval: true
  human_approval_prompt: |
    All quality gates are satisfied for E-18 grouped-collapse (v0.9.0):
    F7 delta-convergence IN PROGRESS (Round-1 findings documented/remediation-in-flight;
    F7 Round-2 pending after doc-fix PR lands on develop); regression ~1700 tests green
    (cargo test --all-targets); F6 HARDENED (mutation 85%+ on terminal.rs + main.rs,
    VP-012 escape proptest passing, Kani + fuzz parsers provably unaffected, NO new VP);
    F5 scoped-adversarial 3/3 SATISFIED; STORY-120 (PR #266), STORY-122 (PR #268),
    STORY-119 (PR #269) all delivered and merged to develop.
    Cycle path: .factory/cycles/feature-story-119-grouped-collapse/
    Proposed tag: v{version} (computed from Cargo.toml package.version) on branch main
    (merged from develop via gitflow release/X.Y.Z branch).
    NOTE: v0.9.0 release is HELD pending F7 Round-2 convergence. Approve ONLY after
    F7 Round-2 triple A/B/C returns CLEAN.
    GitHub Release will be created with cross-compiled binary artifacts via release.yml.
    crates.io publish is DISABLED.
    Approve release of v{version}? (yes/no)

# ── Pre-release checks ────────────────────────────────────────────────────────
pre_release:
  - name: "cargo fmt check"
    command: "cargo fmt --check"
    working_directory: "."
  - name: "cargo clippy"
    command: "cargo clippy --all-targets -- -D warnings"
    working_directory: "."
  - name: "cargo test"
    command: "cargo test --all-targets"
    working_directory: "."
  - name: "cargo audit"
    command: "cargo audit --ignore RUSTSEC-2026-0097"
    working_directory: "."

# ── GitHub Release ────────────────────────────────────────────────────────────
github_release:
  enabled: true
  owner: Zious11
  repo: wirerust
  # Release title template: "v{version}: {changelog_first_line}"
  title_template: "v{version}: {changelog_title}"
  # Notes are extracted from the [X.Y.Z] section in CHANGELOG.md matching the release version
  notes_source: changelog_section
  # Draft the release first; publish after artifact upload completes
  draft: false
  prerelease: false

# ── Binary artifacts (cross-compiled, attached to GitHub Release) ─────────────
artifacts:
  enabled: true
  # Naming convention: wirerust-v{version}-{target}.{ext}
  # e.g. wirerust-v0.1.0-x86_64-unknown-linux-gnu.tar.gz
  name_template: "wirerust-v{version}-{target}.{ext}"
  # Archive format per platform family
  archive:
    unix: tar.gz
    windows: zip
  targets:
    - target: x86_64-unknown-linux-gnu
      os: linux
      arch: x86_64
      # Cross-compilation via GitHub Actions release.yml (operational since v0.6.0).
      build_command: "cargo build --release --target x86_64-unknown-linux-gnu"
      strip: true
    - target: aarch64-apple-darwin
      os: macos
      arch: arm64
      build_command: "cargo build --release --target aarch64-apple-darwin"
      strip: true
    - target: x86_64-apple-darwin
      os: macos
      arch: x86_64
      build_command: "cargo build --release --target x86_64-apple-darwin"
      strip: true
    - target: x86_64-pc-windows-msvc
      os: windows
      arch: x86_64
      # Built on Windows runner in release.yml (v0.6.0: auto-built and uploaded successfully).
      build_command: "cargo build --release --target x86_64-pc-windows-msvc"
      strip: false

# ── Registry publish (crates.io) ─────────────────────────────────────────────
publish:
  crates_io:
    enabled: false  # human chose: NO crates.io publish for v0.1.0
    # To enable for a future release: set enabled: true and add CARGO_REGISTRY_TOKEN
    # to GitHub Secrets. Then re-run vsdd-factory:release.
    token_secret: CARGO_REGISTRY_TOKEN   # referenced only; not used while disabled

# ── CI workflow reference ─────────────────────────────────────────────────────
ci:
  # The CI workflow that must be green on main before the GitHub Release is
  # created. release.yml is the binary-build workflow (operational since v0.6.0;
  # produced 4 artifacts on tag push). ci.yml is the primary test/lint workflow
  # that must pass on the release branch before tagging.
  ci_workflow: ".github/workflows/ci.yml"
  release_workflow: ".github/workflows/release.yml"  # auto-builds binaries on tag push
  # Status checks that must pass on main before tagging
  required_checks:
    - "Test"
    - "Clippy"
    - "Format"
    - "Fuzz build"
    - "Audit"
    - "Deny"
    - "Trust-boundary (test-seam gate)"

# ── Autonomy / pause points ───────────────────────────────────────────────────
autonomy:
  # pause-before-publish: the release skill runs all pre-release checks,
  # shows the proposed tag + release notes, then STOPS and waits for
  # explicit human "yes" before pushing the tag or creating the GitHub Release.
  mode: pause-before-publish

  # Explicit pause points (in addition to quality_gates.require_human_approval)
  pause_before_tag: true       # pause before `git tag` + `git push origin vX.Y.Z`
  pause_before_gh_release: true  # pause before `gh release create`

  # After human approval, no further pauses during artifact upload
  pause_before_artifact_upload: false
